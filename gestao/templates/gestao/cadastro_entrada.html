{% extends "painel_base.html" %}
{% load static %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://unpkg.com/imask"></script>

<div class="container-fluid">
    <form method="POST" action="{% url 'registrar' %}" id="formPrincipal" class="needs-validation" novalidate>
        {% csrf_token %}
        
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4 border-top border-4 border-success">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="fw-bold text-primary mb-0">
                        <i class="bi bi-shield-check me-2"></i>1. DADOS DA OCORRÊNCIA E CUSTÓDIA
                    </h6>
                    <span class="badge bg-dark text-white p-2">OPERADOR: {{ request.user.get_full_name|upper }}</span>
                </div>

                <div class="row g-3">
                    <div class="col-md-2">
                        <label class="form-label small fw-bold">Data do Fato *</label>
                        <input type="date" name="data_registro" id="data_registro" class="form-control" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">Nº BOU (Ano/Sequência) *</label>
                        <input type="text" name="bou" id="mask_bou" class="form-control" placeholder="2026/0000000" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">Nº PROJUDI (Processo)</label>
                        <input type="text" name="processo" id="mask_projudi" class="form-control" placeholder="0000000-00.2026.8.16.0021">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">Vara Destino *</label>
                        <select name="vara" class="form-select" required>
                            <option value="" selected disabled>Selecione a Vara...</option>
                            <option value="VARA_01">1ª Vara Criminal</option>
                            <option value="VARA_02">2ª Vara Criminal</option>
                            <option value="VARA_03">3ª Vara Criminal</option>                           
                        </select>
                    </div>
                </div>

                <div class="row g-3 mt-2">
                    <div class="col-md-2">
                        <label class="form-label small fw-bold">Unidade/Equipe</label>
                        <select name="unidade_origem" id="select_unidade" class="form-select" onchange="verificarUnidade(this.value)">
                            <option value="RPA">RPA</option>
                            <option value="RPA">CPU</option>
                            <option value="DEAEV">DEAEV</option>
                            <option value="ROCAM">ROCAM</option>
                            <option value="CHOQUE">CHOQUE</option>
                            <option value="CAVALARIA">CAVALARIA</option>
                            <option value="P2">ALI / P2</option>
                            <option value="RPA STO">RPA STO</option>
                            <option value="RPA LINDOESTE">RPA LINDOESTE</option>
                            <option value="OUTRA">OUTRA (DIGITAR...)</option>
                        </select>
                    </div>

                    <div class="col-md-2" id="div_unidade_extra" style="display: none;">
                        <label class="form-label small fw-bold text-danger">Qual Unidade? *</label>
                        <input type="text" name="unidade_especifica" id="input_unidade_especifica" class="form-control border-danger text-uppercase" placeholder="Ex: BPFRON, PF...">
                    </div>

                    <div class="col-md-2">
                        <label class="form-label small fw-bold">Graduação</label>
                        <select name="policial_graduacao" class="form-select">
                            <optgroup label="Praças">
                                <option value="SD">Soldado</option>
                                <option value="CB">Cabo</option>
                                <option value="3SGT">3º Sargento</option>
                                <option value="2SGT">2º Sargento</option>
                                <option value="1SGT">1º Sargento</option>
                                <option value="SUB">Subtenente</option>
                            </optgroup>
                            <optgroup label="Oficiais">
                                <option value="2TEN">2º Tenente</option>
                                <option value="1TEN">1º Tenente</option>
                                <option value="CAP">Capitão</option>
                                <option value="MAJ">Major</option>
                            </optgroup>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label small fw-bold">Nome do Policial (Entregador) *</label>
                        <input type="text" name="policial_nome" class="form-control text-uppercase" placeholder="NOME COMPLETO" required>
                    </div>
                    
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h6 class="fw-bold mb-0 text-primary"><i class="bi bi-capslock-fill me-2"></i>2. NOTICIADOS E MATERIAIS</h6>
                <button type="button" class="btn btn-primary btn-sm" id="btnAdicionar">
                    <i class="bi bi-plus-lg me-1"></i> Adicionar Noticiado/Droga
                </button>
            </div>
            <div class="card-body bg-light" id="container-noticiados">
                <div class="row g-2 border rounded p-3 mb-3 bg-white item-noticiado shadow-sm">
                    <div class="col-md-4">
                        <label class="small fw-bold text-muted">Nome do Noticiado</label>
                        <input type="text" name="nome_noticiado[]" class="form-control text-uppercase" placeholder="NOME DO PRESO/INFRATOR" required>
                    </div>
                    <div class="col-md-2">
                        <label class="small fw-bold text-muted">Substância</label>
                        <select name="substancia[]" class="form-select">
                            <option value="MACONHA">Maconha</option>
                            <option value="COCAINA">Cocaína</option>
                            <option value="CRACK">Crack</option>
                            <option value="SINTETICA">Sintética (Ecstasy/LSD)</option>
                            <option value="SKUNK">Skunk</option>
                            <option value="HAXIXE">Haxixe</option>
                            <option value="OUTROS">Outros</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="small fw-bold text-muted">Peso Est. (g)</label>
                        <input type="text" name="peso_estimado[]" class="form-control mask-peso" placeholder="0,00" required>
                    </div>
                    <div class="col-md-2">
                        <label class="small fw-bold text-muted">Nº Lacre/Vestígio</label>
                        <input type="text" name="lacre[]" class="form-control" placeholder="Opcional">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="button" class="btn btn-outline-danger w-100 btn-remover" style="display:none;">
                            <i class="bi bi-trash"></i> Excluir
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-success btn-lg w-100 fw-bold shadow-lg mb-5">
            <i class="bi bi-save2 me-2"></i> FINALIZAR REGISTRO E GERAR RECIBO
        </button>
    </form>
</div>

<script>
    // 1. CONFIGURAÇÃO DE MÁSCARAS
    const maskOptions = {
        bou: { mask: '0000/0000000' },
        projudi: { mask: '0000000-00.0000.8.16.0000' },
        rg: { mask: '00.000.000-0' }
    };

    IMask(document.getElementById('mask_bou'), maskOptions.bou);
    IMask(document.getElementById('mask_projudi'), maskOptions.projudi);
    IMask(document.getElementById('mask_rg'), maskOptions.rg);

    function aplicarMascaraPeso(el) {
        IMask(el, {
            mask: Number,
            scale: 2,
            radix: ',',
            mapToRadix: ['.'],
            normalizeZeros: true,
            padFractionalZeros: true
        });
    }
    document.querySelectorAll('.mask-peso').forEach(aplicarMascaraPeso);

    // 2. MOSTRAR/ESCONDER UNIDADE EXTERNA
    function verificarUnidade(valor) {
        const divExtra = document.getElementById('div_unidade_extra');
        const inputExtra = document.getElementById('input_unidade_especifica');
        
        if (valor === 'OUTRA') {
            divExtra.style.display = 'block';
            inputExtra.setAttribute('required', 'required');
            inputExtra.focus();
        } else {
            divExtra.style.display = 'none';
            inputExtra.removeAttribute('required');
            inputExtra.value = '';
        }
    }

    // 3. LÓGICA DE ADICIONAR/REMOVER ITENS DINÂMICOS
    document.getElementById('btnAdicionar').addEventListener('click', function() {
        const container = document.getElementById('container-noticiados');
        const itens = container.querySelectorAll('.item-noticiado');
        const novoItem = itens[0].cloneNode(true);
        
        novoItem.querySelectorAll('input').forEach(i => i.value = '');
        const btnRemover = novoItem.querySelector('.btn-remover');
        btnRemover.style.display = 'block';
        
        container.appendChild(novoItem);
        aplicarMascaraPeso(novoItem.querySelector('.mask-peso'));
    });

    document.addEventListener('click', function(e) {
        if (e.target.closest('.btn-remover')) {
            Swal.fire({
                title: 'Remover item?',
                text: "Os dados deste noticiado serão apagados.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                confirmButtonText: 'Sim, remover'
            }).then((result) => {
                if (result.isConfirmed) {
                    e.target.closest('.item-noticiado').remove();
                }
            });
        }
    });

    // 4. VALIDAÇÃO BOOTSTRAP E ALERTA DE SUCESSO/ERRO
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                    Swal.fire('Campos Obrigatórios', 'Por favor, preencha todos os campos marcados com *', 'error');
                }
                form.classList.add('was-validated')
            }, false)
        })
    })();

    // 5. SWEETALERT DE PÓS-CADASTRO (RECIBO)
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const sucessoId = urlParams.get('sucesso_id');

        if (sucessoId) {
            Swal.fire({
                title: 'Registro Concluído!',
                text: "O material foi acautelado com sucesso no 6º BPM.",
                icon: 'success',
                showCancelButton: true,
                confirmButtonColor: '#198754',
                cancelButtonColor: '#6c757d',
                confirmButtonText: '<i class="bi bi-printer"></i> IMPRIMIR RECIBO',
                cancelButtonText: 'NOVO CADASTRO',
                allowOutsideClick: false
            }).then((result) => {
                if (result.isConfirmed) {
                    // URL ajustada para bater com seu urls.py
                    window.open(`/relatorio/recibo/${sucessoId}/`, '_blank');
                    window.history.replaceState({}, document.title, window.location.pathname);
                } else {
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            });
        }
    });

    // ... (mantenha suas máscaras e outras funções)

// 4. VALIDAÇÃO DE DATA E SUBMIT
(function () {
    'use strict'
    var form = document.getElementById('formPrincipal');
    var inputData = document.getElementById('data_registro');

    // Função para obter data de hoje sem horas (meia-noite) para comparação justa
    function getHoje() {
        const d = new Date();
        d.setHours(0, 0, 0, 0);
        return d;
    }

    // Monitorar mudança na data para aviso de retroatividade
    inputData.addEventListener('change', function() {
        const dataSelecionada = new Date(this.value + 'T00:00:00');
        const hoje = getHoje();

        if (dataSelecionada < hoje) {
            Swal.fire({
                title: 'Data Retroativa',
                text: 'Atenção: Você selecionou uma data anterior a hoje. Certifique-se de que o BOU corresponde a um registro antigo.',
                icon: 'info',
                toast: true,
                position: 'top-end',
                timer: 5000,
                showConfirmButton: false
            });
        }
    });

    form.addEventListener('submit', function (event) {
        // Captura a data selecionada (ajustando fuso horário)
        const dataSelecionada = new Date(inputData.value + 'T00:00:00');
        const hoje = getHoje();

        // Bloqueio de data futura
        if (dataSelecionada > hoje) {
            event.preventDefault();
            event.stopPropagation();
            
            Swal.fire({
                title: 'Data Inválida!',
                text: 'Não é possível realizar registros com data futura.',
                icon: 'error',
                confirmButtonColor: '#d33'
            });
            return;
        }

        // Validação padrão do Bootstrap
        if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
            Swal.fire('Campos Obrigatórios', 'Por favor, preencha todos os campos marcados com *', 'error');
        }
        
        form.classList.add('was-validated');
    }, false);
})();

// ... (mantenha o restante do código do recibo)

</script>

<style>
    .item-noticiado { transition: all 0.2s; border-left: 5px solid #198754 !important; }
    .item-noticiado:hover { border-left-color: #0d6efd !important; transform: scale(1.005); }
    .form-control:focus { border-color: #198754; box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25); }
</style>
{% endblock %}
