{% load static %}
<!DOCTYPE html>
<html lang="pt-br" class="h-full bg-pmpr-dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6º BPM - Acesso ao Sistema</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pmpr: {
                            green: '#1a3a2a',
                            dark: '#142d20',
                            gold: '#c5a059',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); }
        .bg-pattern {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c5a059' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6zM36 4V0h-2v4h-4v2h4v4h2V6h4V4h-4z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="h-full font-sans antialiased text-white flex items-center justify-center bg-pattern overflow-hidden">

    <div class="relative w-full max-w-lg px-6">
        
        <!-- Decorative Glow -->
        <div class="absolute -top-24 -left-24 w-64 h-64 bg-pmpr-gold/20 rounded-full blur-[100px]"></div>
        <div class="absolute -bottom-24 -right-24 w-64 h-64 bg-emerald-500/10 rounded-full blur-[100px]"></div>

        <div class="relative glass border border-white/10 rounded-[3rem] p-10 lg:p-14 shadow-2xl overflow-hidden">
            
            <div class="text-center mb-10">
                <div class="relative inline-block mb-6 group">
                    <div class="absolute inset-0 bg-pmpr-gold blur-[40px] opacity-20 group-hover:opacity-40 transition-opacity"></div>
                    <img src="{% static 'img/brasao_pmpr.svg' %}" alt="PMPR" class="relative h-28 mx-auto drop-shadow-2xl translate-y-0 group-hover:-translate-y-2 transition-transform duration-500">
                </div>
                
                <h1 class="text-3xl font-black tracking-tighter mb-2">OPERACIONAL 6º BPM</h1>
                <p class="text-xs font-bold uppercase tracking-[0.2em] text-pmpr-gold opacity-80 mb-0">Sistema de Gestão de Custódia</p>
                <div class="w-12 h-1 bg-pmpr-gold/30 mx-auto mt-4 rounded-full"></div>
            </div>

            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <div class="space-y-2 group">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-pmpr-gold ml-4">Identificação Militar</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-white/30 group-focus-within:text-pmpr-gold transition-colors">
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </div>
                        <input type="text" name="username" required placeholder="Digite seu RG ou Login"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-14 pr-6 text-sm font-bold placeholder:text-white/20 outline-none focus:ring-2 focus:ring-pmpr-gold focus:border-transparent transition-all">
                    </div>
                </div>

                <div class="space-y-2 group">
                    <label class="block text-[10px] font-black uppercase tracking-widest text-pmpr-gold ml-4">Chave de Segurança</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-white/30 group-focus-within:text-pmpr-gold transition-colors">
                            <i data-lucide="lock" class="w-5 h-5"></i>
                        </div>
                        <input type="password" name="password" required placeholder="••••••••"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-14 pr-6 text-sm font-bold placeholder:text-white/20 outline-none focus:ring-2 focus:ring-pmpr-gold focus:border-transparent transition-all">
                    </div>
                </div>

                <button type="submit" 
                    class="w-full bg-pmpr-gold text-pmpr-dark font-black text-xs uppercase tracking-[0.2em] py-5 rounded-2xl shadow-xl shadow-pmpr-gold/10 hover:bg-white transition-all active:scale-[0.98] mt-4">
                    Validar Acesso
                </button>
            </form>

            {% if form.errors %}
            <div class="mt-8 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl flex items-center gap-4 text-red-200">
                <i data-lucide="alert-triangle" class="w-5 h-5"></i>
                <p class="text-xs font-bold uppercase tracking-tight">Credenciais inválidas para o sistema.</p>
            </div>
            {% endif %}

            <div class="mt-12 text-center">
                <p class="text-[9px] font-black text-white/20 uppercase tracking-[0.3em] flex items-center justify-center gap-2">
                    <i data-lucide="shield" class="w-3 h-3"></i>
                    Ambiente Monitorado
                </p>
            </div>
        </div>

        <p class="text-center mt-8 text-[10px] font-bold text-white/20 uppercase tracking-widest">
            Desenvolvido pelo setor de TI - 6º BPM &copy; 2024
        </p>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
