          type: string
          format: date-time
          nullable: true
        status:
          enum:
          - ABERTO
          - INCINERADO
          type: string
          description: |-
            * `ABERTO` - Aberto
            * `INCINERADO` - Incinerado
          x-spec-enum-id: ac56e117664a4d88
        eprotocolo_geral:
          type: string
          nullable: true
          title: EProtocolo do Comando
          maxLength: 50
        materiais:
          type: array
          items:
            $ref: '#/components/schemas/Material'
          readOnly: true
        data_criacao:
          type: string
          format: date-time
          readOnly: true
      required:
      - data_criacao
      - id
      - identificador
      - materiais
    Material:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        noticiado:
          type: integer
          readOnly: true
        categoria:
          enum:
          - ENTORPECENTE
          - SOM
          - FACA
          - SIMULACRO
          - OUTROS
          - DINHEIRO
          type: string
          description: |-
            * `ENTORPECENTE` - Entorpecente
            * `SOM` - Equipamento de Som (Perturbação)
            * `FACA` - Arma Branca / Faca
            * `SIMULACRO` - Simulacro / Arma de Fogo
            * `OUTROS` - Outros Objetos (Gerais)
            * `DINHEIRO` - Dinheiro / Valores monetários
          x-spec-enum-id: f267cc73601a979a
        substancia:
          enum:
          - MACONHA
          - SKUNK
          - HASHISH
          - COCAINA_PO
          - COCAINA_CRA
          - OPIACEOS
          - MDF
          - LSD
          - ECSTASY
          - METANFETAMINA
          - COCAINAMINA
          - RECEPTACULO
          - SEMENTE
          - COLHEITA
          - OUTRA
          - ''
          - null
          type: string
          description: |-
            * `MACONHA` - Maconha (Flor/Cume)
            * `SKUNK` - Skunk (Maconha Importada)
            * `HASHISH` - Haxixe (Hashish)
            * `COCAINA_PO` - Cocaína (Pó/Branca)
            * `COCAINA_CRA` - Crack (Cocaína Base)
            * `OPIACEOS` - Ópio / Heroína
            * `MDF` - Maconha de Fumo (MDF)
            * `LSD` - LSD (Ácido)
            * `ECSTASY` - Ecstasy / MDMA
            * `METANFETAMINA` - Metanfetamina (Crystal)
            * `COCAINAMINA` - Cocainaína (Merla)
            * `RECEPTACULO` - Receptáculo/Eppendorf
            * `SEMENTE` - Semente de Maconha
            * `COLHEITA` - Planta/Colheita de Maconha
            * `OUTRA` - Outra Substância
          x-spec-enum-id: fdaa34e89d63bb2a
          nullable: true
        outra_substancia:
          type: string
          nullable: true
          maxLength: 100
