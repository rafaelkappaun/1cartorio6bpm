  /api/materiais/:
    get:
      operationId: materiais_list
      parameters:
      - in: query
        name: categoria
        schema:
          type: string
          x-spec-enum-id: f267cc73601a979a
          enum:
          - DINHEIRO
          - ENTORPECENTE
          - FACA
          - OUTROS
          - SIMULACRO
          - SOM
        description: |-
          * `ENTORPECENTE` - Entorpecente
          * `SOM` - Equipamento de Som (Perturbação)
          * `FACA` - Arma Branca / Faca
          * `SIMULACRO` - Simulacro / Arma de Fogo
          * `OUTROS` - Outros Objetos (Gerais)
          * `DINHEIRO` - Dinheiro / Valores monetários
      - in: query
        name: data_fim
        schema:
          type: string
          format: date
      - in: query
        name: data_inicio
        schema:
          type: string
          format: date
      - in: query
        name: lote
        schema:
          type: integer
      - name: page
        required: false
        in: query
        description: Um número de página dentro do conjunto de resultados paginado.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          x-spec-enum-id: 6ae5a2be094aecb5
          enum:
          - AGUARDANDO_GUIA
          - AGUARDANDO_OFICIO
          - ARMAZENADO
          - AUTORIZADO
          - CONSTATAÇÃO
          - DEPOSITADO_JUDICIALMENTE
          - EM_TRANSPORTE_FORUM
          - ENTREGUE_AO_JUDICIARIO
          - GUIA_GERADA
          - INCINERADO
          - OFICIO_GERADO
          - RECEBIDO
          - RETIRADO_PERICIA
          - RETORNO_PERICIA
          - TRANSPORTE
        description: |-
          * `RECEBIDO` - Entrada no Cartório (Lacre Conferido)
          * `CONSTATAÇÃO` - Processamento (Auto de Constatação Realizado)
          * `ARMAZENADO` - Armazenamento (No Cofre)
          * `RETIRADO_PERICIA` - Saída Temporária (Enviado para Perícia Externa)
          * `RETORNO_PERICIA` - Retorno de Perícia (Re-armazenado)
          * `AUTORIZADO` - Aguardando Incineração (Ordem Judicial)
          * `TRANSPORTE` - Em Transporte (Para Destruição)
          * `INCINERADO` - Fim de Custódia (Incinerado)
          * `AGUARDANDO_OFICIO` - Aguardando Geração de Ofício (Materiais Gerais)
          * `OFICIO_GERADO` - Ofício Gerado (Aguardando Transporte)
          * `EM_TRANSPORTE_FORUM` - Em Transporte (Para o Fórum)
          * `ENTREGUE_AO_JUDICIARIO` - Entregue ao Judiciário (Fórum / Recibo Anexado)
          * `AGUARDANDO_GUIA` - Aguardando Guia de Depósito (Dinheiro)
          * `GUIA_GERADA` - Guia Gerada (Aguardando Depósito)
          * `DEPOSITADO_JUDICIALMENTE` - Depositado (Comprovante Anexado)
      tags:
      - materiais
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedMaterialList'
          description: ''
    post:
      operationId: materiais_create
      tags:
      - materiais
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Material'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Material'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Material'
      security:
      - jwtAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Material'
          description: ''
