          nullable: true
          title: Nome Popular / Característica
          maxLength: 100
        peso_estimado:
          type: string
          format: decimal
          pattern: ^-?\d{0,9}(?:\.\d{0,3})?$
          nullable: true
        peso_real:
          type: string
          format: decimal
          pattern: ^-?\d{0,9}(?:\.\d{0,3})?$
          nullable: true
        unidade:
          enum:
          - G
          - KG
          - UN
          - ''
          - null
          type: string
          description: |-
            * `G` - Gramas (g)
            * `KG` - Quilos (kg)
            * `UN` - Unidades (Pés/Comprimidos)
          x-spec-enum-id: 4628c5d6cb1d9dfd
          nullable: true
        lote:
          type: integer
          nullable: true
        descricao_geral:
          type: string
          nullable: true
          description: 'Ex: Marca do som, modelo do simulacro, etc.'
        valor_monetario:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          nullable: true
          title: Valor em Dinheiro (R$)
        recibo_forum:
          type: string
          format: uri
          nullable: true
          title: Recibo Assinado do Fórum
        comprovante_deposito:
          type: string
          format: uri
          nullable: true
          title: Comprovante de Depósito PIX/TED
        numero_lacre:
          type: string
          nullable: true
          title: Nº Lacre (Cadeia de Custódia)
          maxLength: 50
        localizacao_no_cofre:
          type: string
          nullable: true
          description: 'Ex: Armário 1, Prateleira B'
          maxLength: 100
        status:
          enum:
          - RECEBIDO
          - CONSTATAÇÃO
          - ARMAZENADO
          - RETIRADO_PERICIA
          - RETORNO_PERICIA
          - AUTORIZADO
          - TRANSPORTE
          - INCINERADO
          - AGUARDANDO_OFICIO
          - OFICIO_GERADO
          - EM_TRANSPORTE_FORUM
          - ENTREGUE_AO_JUDICIARIO
          - AGUARDANDO_GUIA
          - GUIA_GERADA
          - DEPOSITADO_JUDICIALMENTE
          type: string
          description: |-
            * `RECEBIDO` - Entrada no Cartório (Lacre Conferido)
            * `CONSTATAÇÃO` - Processamento (Auto de Constatação Realizado)
            * `ARMAZENADO` - Armazenamento (No Cofre)
            * `RETIRADO_PERICIA` - Saída Temporária (Enviado para Perícia Externa)
            * `RETORNO_PERICIA` - Retorno de Perícia (Re-armazenado)
            * `AUTORIZADO` - Aguardando Incineração (Ordem Judicial)
            * `TRANSPORTE` - Em Transporte (Para Destruição)
            * `INCINERADO` - Fim de Custódia (Incinerado)
            * `AGUARDANDO_OFICIO` - Aguardando Geração de Ofício (Materiais Gerais)
            * `OFICIO_GERADO` - Ofício Gerado (Aguardando Transporte)
            * `EM_TRANSPORTE_FORUM` - Em Transporte (Para o Fórum)
            * `ENTREGUE_AO_JUDICIARIO` - Entregue ao Judiciário (Fórum / Recibo Anexado)
            * `AGUARDANDO_GUIA` - Aguardando Guia de Depósito (Dinheiro)
            * `GUIA_GERADA` - Guia Gerada (Aguardando Depósito)
            * `DEPOSITADO_JUDICIALMENTE` - Depositado (Comprovante Anexado)
          x-spec-enum-id: 6ae5a2be094aecb5
        eprotocolo_geral:
          type: string
          nullable: true
        descricao_amigavel:
          type: string
          readOnly: true
        peso_formatado:
          type: string
          readOnly: true
        historico:
