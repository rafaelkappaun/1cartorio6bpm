          readOnly: true
        nome:
          type: string
          maxLength: 100
        graduacao:
          enum:
          - SD
          - CB
          - 3SGT
          - 2SGT
          - 1SGT
          - SUB
          - 2TEN
          - 1TEN
          - CAP
          - MAJ
          type: string
          description: |-
            * `SD` - Soldado
            * `CB` - Cabo
            * `3SGT` - 3º Sargento
            * `2SGT` - 2º Sargento
            * `1SGT` - 1º Sargento
            * `SUB` - Subtenente
            * `2TEN` - 2º Tenente
            * `1TEN` - 1º Tenente
            * `CAP` - Capitão
            * `MAJ` - Major
          x-spec-enum-id: 1a45a9daf428d0d5
        rg:
          type: string
          maxLength: 20
        unidade:
          enum:
          - RPA
          - DEAEV
          - ROCAM
          - GOTRAN
          - CAVALARIA
          - CHOQUE
          - CHOQUE CANIL
          - TRANSITO
          - ROTAM
          - CPU
          - P2
          - OUTRA
          type: string
          description: |-
            * `RPA` - RPA
            * `DEAEV` - DEAEV
            * `ROCAM` - ROCAM
            * `GOTRAN` - GOTRAN
            * `CAVALARIA` - CAVALARIA
            * `CHOQUE` - CHOQUE
            * `CHOQUE CANIL` - CHOQUE CANIL
            * `TRANSITO` - TRANSITO
            * `ROTAM` - ROTAM
            * `CPU` - CPU
            * `P2` - P2
            * `OUTRA` - Outra Unidade (Especificar)
          x-spec-enum-id: 553441ace8f1714e
      required:
      - graduacao
      - id
      - nome
      - rg
    LoteIncineracao:
      type: object
